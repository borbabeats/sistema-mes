name: Deploy to EC2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm run test
      
      - name: Run linting
        run: npm run lint:check || true
      
      - name: Build application
        run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Get runner public IP
        id: ip
        uses: haythem/public-ip@v1.3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Add runner IP to Security Group
        run: |
          aws ec2 authorize-security-group-ingress \
            --region us-east-1 \
            --group-id sg-097e19a6935ebaca8 \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32
      
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 300s
          command_timeout: 60s
          script: |
            # Entrar no diretório do projeto
            cd /opt/sistema-mes
            
            # Fazer pull das atualizações
            git pull origin main
            
            # Parar containers PM2
            pm2 stop all
            
            # Remover imagens antigas para economizar espaço
            docker system prune -f
            
            # Iniciar PM2 (vai fazer build via script)
            pm2 start ecosystem.config.js
            
            # Aguardar container iniciar
            sleep 30
            
            # Restart forçado para garantir nova versão
            pm2 restart all
            
            # Aguardar mais um pouco
            sleep 15
            
            # Verificar status
            docker compose ps
            
            # Mostrar logs recentes
            docker compose logs --tail=20
      
      - name: Remove runner IP from Security Group
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --region us-east-1 \
            --group-id sg-097e19a6935ebaca8 \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32

  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Wait for deployment
        run: sleep 60
      
      - name: Health Check
        run: |
          echo "Testing health endpoint..."
          for i in {1..5}; do
            echo "Attempt $i/5..."
            response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://${{ secrets.EC2_HOST }}:3000/health)
            echo "Response code: $response"
            if [ $response -eq 200 ]; then
              echo "Health check passed - Application is responding"
              exit 0
            fi
            echo "Retrying in 15 seconds..."
            sleep 15
          done
          echo "Health check failed after 5 attempts"
          exit 1
      
      - name: API Documentation Check
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }}:3000/health)
          if [ $response -eq 200 ]; then
            echo "API documentation is accessible"
          else
            echo "API documentation check failed - Status code: $response"
            exit 1
          fi
