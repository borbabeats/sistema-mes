name: Deploy to EC2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm run test
      
      - name: Run linting
        run: npm run lint:check || true
      
      - name: Build application
        run: npm run build

  update-ec2-host:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Get EC2 public IP
        id: get-ip
        run: |
          IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=sistema-mes" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          echo "IP=$IP" >> $GITHUB_OUTPUT
          echo "Found EC2 IP: $IP"
      
      - name: Update EC2_HOST secret
        run: |
          echo "${{ steps.get-ip.outputs.IP }}" | gh secret set EC2_HOST
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: [test, update-ec2-host]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build application
        run: npm run build
      
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 300s
          command_timeout: 60s
          script: |
            # Entrar no diretório do projeto
            cd /opt/sistema-mes
            
            # Fazer pull das atualizações
            git pull origin main
            
            # Parar containers PM2
            pm2 stop all
            
            # Remover imagens antigas para economizar espaço
            docker system prune -f
            
            # Iniciar PM2 (vai fazer build via script)
            pm2 start ecosystem.config.js
            
            # Aguardar container iniciar
            sleep 30
            
            # Verificar status
            docker-compose ps
            
            # Mostrar logs recentes
            docker-compose logs --tail=20

  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Wait for deployment
        run: sleep 30
      
      - name: Health Check
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }}:3000/health)
          if [ $response -eq 200 ]; then
            echo "✅ Health check passed - Application is responding"
          else
            echo "❌ Health check failed - Status code: $response"
            exit 1
          fi
      
      - name: API Documentation Check
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }}:3000/api)
          if [ $response -eq 200 ]; then
            echo "✅ API documentation is accessible"
          else
            echo "❌ API documentation check failed - Status code: $response"
            exit 1
          fi
