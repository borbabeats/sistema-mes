version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sistema_mes_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: mes_system
      MYSQL_USER: mes_user
      MYSQL_PASSWORD: mes123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - mes_network

volumes:
  mysql_data:

networks:
  mes_network:
    driver: bridge
